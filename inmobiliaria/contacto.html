<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Solicitar información</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }
    .form-card {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

<div class="form-card">
  <h3 class="mb-3">Solicitar información</h3>
  <p class="text-muted">Completa el formulario y confirma por WhatsApp.</p>

  <form id="contactForm">
    <div class="mb-3">
      <label class="form-label">Nombre completo</label>
      <input type="text" class="form-control" id="nombre" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Teléfono</label>
      <input type="tel" class="form-control" id="telefono" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" id="correo" required>
    </div>

    <div class="mb-3">
      <label class="form-label">¿Qué te interesa?</label>
      <select class="form-select" id="interes" required>
        <option value="">Selecciona una opción</option>
        <option>Comprar</option>
        <option>Rentar</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Mensaje (opcional)</label>
      <textarea class="form-control" id="mensaje" rows="3"></textarea>
    </div>

    <!-- Aquí iría el reCAPTCHA si lo agregas -->

    <button type="submit" class="btn btn-primary w-100">
      Enviar solicitud
    </button>
  </form>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let nombre = document.getElementById("nombre").value;
  let telefono = document.getElementById("telefono").value;
  let correo = document.getElementById("correo").value;
  let interes = document.getElementById("interes").value;
  let mensaje = document.getElementById("mensaje").value;

  // Código de propiedad (puedes cambiarlo dinámicamente)
  let codigoCasa = "CASA-1023";

  let texto = `Hola, estoy interesado en la propiedad ${codigoCasa}.
Nombre: ${nombre}
Teléfono: ${telefono}
Correo: ${correo}
Interés: ${interes}
Mensaje: ${mensaje}`;

  let numero = "7551712450"; // ← cambia por tu número
  let url = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;

  window.location.href = url;
});
</script>

</body>
</html>
